name: Run Daily TRM Scraper

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-cloud-bigquery pytz

    - name: Create GCP Keys File from Secret
      run: |
        echo "${{ secrets.GCP_KEYS_JSON }}" > bigquery-keys.json

    - name: Run Pipeline Script
      run: |
        python load_to_bigquery.py
      