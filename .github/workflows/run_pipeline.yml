name: Run Daily TRM Scraper

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-cloud-bigquery pytz

    - name: Create GCP Keys File from Secret
      uses: jason2bytes/output-to-file@v1.0.3
      with:
        filename: 'bigquery-keys.json'
        content: ${{ secrets.GCP_KEYS_JSON }}

    - name: Run Pipeline Script
      run: |
        python load_to_bigquery.py
      